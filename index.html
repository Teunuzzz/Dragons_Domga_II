<!doctype html><html lang="nl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Dragon's Dogma II Companion</title><link rel="manifest" href="manifest.json"><style>
:root{--bg:#0d1017;--panel:#151a24;--panel2:#1d2431;--text:#f4ead6;--muted:#b6a98f;--gold:#d6a846;--red:#e15e4f;--green:#65c97a;--blue:#5aa8ff;--line:#343c4b}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}header{position:sticky;top:0;z-index:30;background:#090b10e8;backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:10px 12px}h1{font-size:18px;margin:0;color:var(--gold)}.sub{font-size:12px;color:var(--muted);margin-top:2px}.toolbar{display:flex;gap:8px;overflow:auto;margin-top:10px}.tab,button,select,input{border:1px solid var(--line);background:var(--panel2);color:var(--text);border-radius:10px;padding:9px 10px;font-size:14px}.tab.active,button.primary{background:var(--gold);color:#19140a;border-color:#f0ce75;font-weight:700}.wrap{display:grid;grid-template-columns:1.2fr .8fr;gap:10px;padding:10px}@media(max-width:800px){.wrap{display:block}.panel{margin-bottom:10px}}.panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;overflow:hidden}.panel h2{margin:0;padding:12px;border-bottom:1px solid var(--line);font-size:16px;color:var(--gold)}.pad{padding:12px}.mapShell{position:relative;height:68vh;min-height:430px;background:#07090d;overflow:hidden;touch-action:none}.mapInner{position:absolute;left:0;top:0;transform-origin:0 0}.mapImg{display:block;user-select:none;-webkit-user-drag:none;image-rendering:auto}.marker{position:absolute;transform:translate(-50%,-100%);border:2px solid #101318;border-radius:50% 50% 50% 0;rotate:-45deg;width:30px;height:30px;background:var(--blue);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px #000a;cursor:pointer}.marker span{rotate:45deg;font-size:14px}.marker.town{background:var(--green)}.marker.city{background:#cfa046}.marker.dungeon{background:#9c6cff}.marker.boss{background:var(--red)}.marker.vocation{background:#60d3d7}.marker.selected{outline:3px solid #fff}.anchor{background:#fff;color:#111;width:34px;height:34px}.crosshair{position:absolute;left:50%;top:50%;z-index:8;transform:translate(-50%,-50%);pointer-events:none}.crosshair:before,.crosshair:after{content:"";position:absolute;background:#fff;box-shadow:0 0 0 1px #000}.crosshair:before{width:44px;height:2px;left:-22px}.crosshair:after{height:44px;width:2px;top:-22px}.zoomBtns{position:absolute;right:10px;bottom:10px;z-index:10;display:flex;flex-direction:column;gap:6px}.zoomBtns button{width:42px;height:42px;font-size:22px;padding:0}.hint{font-size:13px;color:var(--muted);line-height:1.45}.list{display:grid;gap:8px}.card{background:#111722;border:1px solid var(--line);border-radius:12px;padding:10px}.card.done{opacity:.58}.card h3{margin:0 0 6px;font-size:15px}.meta{font-size:12px;color:var(--muted);display:flex;gap:6px;flex-wrap:wrap}.pill{background:#263044;border:1px solid #3d4a64;padding:3px 7px;border-radius:999px}.step{border-left:4px solid var(--gold)}.step .num{color:var(--gold);font-weight:800}.hidden{display:none}.search{width:100%;margin-bottom:8px}.filters{display:flex;gap:6px;flex-wrap:wrap}.small{font-size:12px;color:var(--muted)}a{color:#8cc8ff}.row{display:flex;gap:8px;align-items:center;justify-content:space-between}.danger{color:#ff9d96}.ok{color:#93e49d}textarea{width:100%;height:130px;background:#0a0d13;color:var(--text);border:1px solid var(--line);border-radius:12px;padding:10px}.kbd{font-family:ui-monospace,Menlo,monospace;background:#0a0d13;border:1px solid var(--line);border-radius:6px;padding:1px 5px}
</style></head><body><header><h1>Dragon's Dogma II Companion — Teun OP Route</h1><div class="sub">Spoilers aan · PS5 · start: Fighter · doel: beste loot, snel OP, weinig backtracking</div><div class="toolbar"><button class="tab active" data-tab="route">⭐ OP Route</button><button class="tab" data-tab="map">🗺️ Kaart</button><button class="tab" data-tab="db">🎒 Database</button><button class="tab" data-tab="cal">🎯 Kalibratie</button><button class="tab" data-tab="sources">🔗 Bronnen</button><select id="vocationSelect"></select></div></header>
<main class="wrap"><section class="panel"><h2 id="leftTitle">Kaart</h2><div class="mapShell" id="mapShell"><div class="mapInner" id="mapInner"><img class="mapImg" id="mapImg" src="assets/world-map.png" alt="World map"></div><div class="crosshair hidden" id="crosshair"></div><div class="zoomBtns"><button id="zin">+</button><button id="zout">−</button><button id="resetView">⌂</button></div></div></section><aside class="panel"><h2 id="rightTitle">OP Route</h2><div class="pad" id="content"></div></aside></main>
<script>
let DATA={}, currentTab='route', currentVoc='fighter', selected=null; let scale=1, tx=20, ty=20, dragging=false, sx=0, sy=0, stx=0, sty=0; const shell=document.getElementById('mapShell'), inner=document.getElementById('mapInner'), img=document.getElementById('mapImg'), content=document.getElementById('content');
const progress=JSON.parse(localStorage.dd2progress||'{}'); const anchors=JSON.parse(localStorage.dd2anchors||'{}');
async function load(){for(const f of ['locations','vocations','items','routes','sources']) DATA[f]=await fetch('data/'+f+'.json').then(r=>r.json()); initVoc(); render(); if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});}
function initVoc(){const s=document.getElementById('vocationSelect'); DATA.vocations.forEach(v=>{let o=document.createElement('option'); o.value=v.id;o.textContent='Vocation: '+v.name;s.appendChild(o)}); s.value=currentVoc; s.onchange=()=>{currentVoc=s.value;render()}}
function apply(){inner.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;}
function imagePoint(clientX,clientY){const r=shell.getBoundingClientRect(); return {x:(clientX-r.left-tx)/scale,y:(clientY-r.top-ty)/scale}}
function centerAt(x,y){const r=shell.getBoundingClientRect(); tx=r.width/2-x*scale; ty=r.height/2-y*scale; apply()}
function addMarkers(mode='normal'){[...inner.querySelectorAll('.marker')].forEach(e=>e.remove()); const filterVoc=currentVoc; DATA.locations.forEach((l,i)=>{let pos=anchors[l.id]||{x:l.x,y:l.y}; let m=document.createElement('div'); m.className='marker '+l.type+(selected==l.id?' selected':'')+(mode==='cal'?' anchor':''); m.style.left=pos.x+'px'; m.style.top=pos.y+'px'; m.style.width=m.style.height=(mode==='cal'?Math.max(12,34/Math.sqrt(scale)):30)+'px'; m.innerHTML='<span>'+(mode==='cal'?String(i+1):icon(l.type))+'</span>'; m.title=l.name; m.onclick=e=>{e.stopPropagation(); selected=l.id; if(mode==='cal'){centerAt(pos.x,pos.y); renderCal()} else renderInfo(l)}; inner.appendChild(m)});}
function icon(t){return {city:'🏰',town:'🏘️',dungeon:'🕳️',boss:'👹',vocation:'🧙',main:'🐉',endgame:'🌑',region:'🌋'}[t]||'📍'}
function renderInfo(l){content.innerHTML=`<div class=card><h3>${icon(l.type)} ${l.name}</h3><div class=meta><span class=pill>${l.region}</span><span class=pill>${l.type}</span><span class=pill>prio ${l.prio}/5</span></div><p>${l.notes}</p><button onclick="toggleDone('loc-${l.id}')">${progress['loc-'+l.id]?'✓ Gedaan':'Markeer gedaan'}</button></div>`; document.getElementById('rightTitle').textContent=l.name; addMarkers(currentTab==='cal'?'cal':'normal')}
function render(){document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===currentTab)); addMarkers(currentTab==='cal'?'cal':'normal'); document.getElementById('crosshair').classList.toggle('hidden',currentTab!=='cal'); if(currentTab==='route') renderRoute(); if(currentTab==='map') renderMapPanel(); if(currentTab==='db') renderDb(); if(currentTab==='cal') renderCal(); if(currentTab==='sources') renderSources(); apply();}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{currentTab=b.dataset.tab;render()});
function renderRoute(){document.getElementById('rightTitle').textContent='Stap-voor-stap OP Route'; const route=DATA.routes[currentVoc]||DATA.routes.fighter; content.innerHTML=`<input class=search id=q placeholder="Zoek in route..."><div class=hint>Deze route is opgebouwd voor jouw speelstijl: eerst veilig sterk worden, dan vocations/gear unlocken, dan pas story pushen.</div><br><div class=list id=list></div>`; const q=document.getElementById('q'), list=document.getElementById('list'); function draw(){let s=q.value.toLowerCase(); list.innerHTML=''; route.filter(x=>(x.title+x.what+x.loot).toLowerCase().includes(s)).forEach(step=>{let loc=DATA.locations.find(l=>l.id===step.locationId); let id='step-'+currentVoc+'-'+step.num; let d=document.createElement('div'); d.className='card step '+(progress[id]?'done':''); d.innerHTML=`<div class=row><h3><span class=num>${step.num}</span> ${step.title}</h3><input type=checkbox ${progress[id]?'checked':''}></div><div class=meta><span class=pill>${loc?loc.name:step.locationId}</span><span class=pill>${step.for}</span></div><p>${step.what}</p><p><b>Loot/actie onderweg:</b> ${step.loot}</p><button>Toon op kaart</button>`; d.querySelector('input').onchange=e=>{progress[id]=e.target.checked; save(); d.classList.toggle('done',e.target.checked)}; d.querySelector('button').onclick=()=>{if(loc){selected=loc.id; centerAt((anchors[loc.id]||loc).x,(anchors[loc.id]||loc).y); renderInfo(loc)}}; list.appendChild(d)});} q.oninput=draw; draw();}
function renderMapPanel(){document.getElementById('rightTitle').textContent='Kaart & filters'; content.innerHTML='<input class=search id=mq placeholder="Zoek locatie, loot, quest, boss..."><div class="filters"><button onclick="filterType(\'all\')">Alles</button><button onclick="filterType(\'city\')">Steden</button><button onclick="filterType(\'dungeon\')">Dungeons</button><button onclick="filterType(\'vocation\')">Vocations</button><button onclick="filterType(\'boss\')">Bosses</button></div><br><div class=list id=mlist></div>'; const mq=document.getElementById('mq'), ml=document.getElementById('mlist'); window.filterType=(t)=>{mq.value='type:'+t; draw()}; function draw(){let q=mq.value.toLowerCase(); let type=q.startsWith('type:')?q.split(':')[1]:null; ml.innerHTML=''; DATA.locations.filter(l=>(!type||type==='all'||l.type===type)&&(!q||q.startsWith('type:')||(l.name+l.region+l.notes+l.type).toLowerCase().includes(q))).forEach(l=>{let d=document.createElement('div'); d.className='card'; d.innerHTML=`<h3>${icon(l.type)} ${l.name}</h3><div class=small>${l.region} · ${l.notes}</div>`; d.onclick=()=>{selected=l.id; centerAt((anchors[l.id]||l).x,(anchors[l.id]||l).y); renderInfo(l)}; ml.appendChild(d)})} mq.oninput=draw; draw();}
function renderDb(){document.getElementById('rightTitle').textContent='Database'; let items=DATA.items; content.innerHTML='<input class=search id=dq placeholder="Zoek wapens, armor, collectibles..."><div class=list id=dlist></div>'; const dq=document.getElementById('dq'), dl=document.getElementById('dlist'); function draw(){let q=dq.value.toLowerCase(); dl.innerHTML=''; items.filter(i=>(i.name+i.type+i.phase+i.location+i.why+i.bestFor.join(' ')).toLowerCase().includes(q)).forEach(i=>{let d=document.createElement('div'); d.className='card'; d.innerHTML=`<h3>${i.name}</h3><div class=meta><span class=pill>${i.type}</span><span class=pill>${i.phase}</span><span class=pill>${i.bestFor.join(', ')}</span></div><p><b>Locatie:</b> ${i.location}</p><p>${i.why}</p>`; dl.appendChild(d)})} dq.oninput=draw; draw();}
function renderCal(){document.getElementById('rightTitle').textContent='Kalibratie'; const l=DATA.locations.find(x=>x.id===selected)||DATA.locations[0]; selected=l.id; content.innerHTML=`<div class=hint><b>Crosshair-modus:</b> kies een ankerpunt, zoom in, sleep de kaart tot de exacte plek onder het kruis staat en druk op <span class=kbd>Zet ankerpunt op kruis</span>. Je vult dus geen coördinaten blind in.</div><br><div class=card><h3>Actief ankerpunt: ${l.name}</h3><div class=meta><span class=pill>${l.region}</span><span class=pill>${l.type}</span></div><p>${l.notes}</p><button class=primary id=setAnchor>Zet ankerpunt op kruis</button> <button id=nextAnchor>Volgende</button></div><br><button class=primary onclick="calibrateAll()">Kalibreer alle markers</button><button onclick="exportAnchors()">Export kalibratie</button><textarea id=exportBox placeholder="Export verschijnt hier"></textarea><p class=small>Beste volgorde: Melve, Borderwatch Outpost, Vernworth, Bakbattahl, Checkpoint Rest Town, Volcanic Island Camp, Harve Village, Sacred Arbor.</p>`; document.getElementById('setAnchor').onclick=()=>{const r=shell.getBoundingClientRect(); const p=imagePoint(r.left+r.width/2,r.top+r.height/2); anchors[l.id]={x:Math.round(p.x),y:Math.round(p.y)}; localStorage.dd2anchors=JSON.stringify(anchors); addMarkers('cal'); renderCal()}; document.getElementById('nextAnchor').onclick=()=>{let i=DATA.locations.findIndex(x=>x.id===selected); selected=DATA.locations[(i+1)%DATA.locations.length].id; let p=anchors[selected]||DATA.locations[(i+1)%DATA.locations.length]; centerAt(p.x,p.y); renderCal()}; addMarkers('cal')}
window.calibrateAll=()=>{alert('Kalibratie opgeslagen. In deze versie worden ankerpunten exact gebruikt. De volgende stap is jouw export hier plakken, dan verwerk ik de vaste coördinaten in GitHub-data.');};
window.exportAnchors=()=>{document.getElementById('exportBox').value=JSON.stringify(anchors,null,2)};
function renderSources(){document.getElementById('rightTitle').textContent='Bronnen & dataverwerking'; content.innerHTML='<div class=hint>Data is niet letterlijk gekopieerd, maar samengevat/verwerkt naar een eigen Nederlandse database met bronlinks.</div><br><div class=list>'+DATA.sources.map(s=>`<div class=card><h3>${s.name}</h3><p>${s.usedFor}</p><a href="${s.url}" target="_blank">Open bron</a></div>`).join('')+'</div>'}
function toggleDone(id){progress[id]=!progress[id]; save(); render()} function save(){localStorage.dd2progress=JSON.stringify(progress)}
shell.addEventListener('pointerdown',e=>{dragging=true; sx=e.clientX; sy=e.clientY; stx=tx; sty=ty; shell.setPointerCapture(e.pointerId)}); shell.addEventListener('pointermove',e=>{if(!dragging)return; tx=stx+e.clientX-sx; ty=sty+e.clientY-sy; apply()}); shell.addEventListener('pointerup',()=>dragging=false);
function zoom(f){const r=shell.getBoundingClientRect(); const cx=r.width/2, cy=r.height/2; const ix=(cx-tx)/scale, iy=(cy-ty)/scale; scale=Math.max(.5,Math.min(8,scale*f)); tx=cx-ix*scale; ty=cy-iy*scale; apply(); if(currentTab==='cal') addMarkers('cal')}
document.getElementById('zin').onclick=()=>zoom(1.25); document.getElementById('zout').onclick=()=>zoom(.8); document.getElementById('resetView').onclick=()=>{scale=1;tx=20;ty=20;apply(); if(currentTab==='cal') addMarkers('cal')};
img.onload=()=>{apply(); addMarkers()}; load();
</script></body></html>
