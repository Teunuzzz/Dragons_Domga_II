:root{--bg:#080d14;--panel:#121a27;--panel2:#192437;--line:#2d3b52;--text:#eef4ff;--muted:#9ba7b8;--gold:#e9bf55;--ok:#58d68d;--danger:#ff7676;--blue:#74b3ff}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}header{position:sticky;top:0;z-index:30;background:#070b12f7;border-bottom:1px solid var(--line);padding:12px}h1{font-size:18px;margin:0 0 4px}.sub,.muted{font-size:12px;color:var(--muted)}.bar{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}button,select,input,textarea{border:1px solid var(--line);background:var(--panel2);color:var(--text);border-radius:12px;padding:10px 12px;font-weight:750}button.active{background:var(--gold);color:#171008;border-color:#f5da7b}button.good{background:#143a23;border-color:#2c8a50}button.warn{background:#3b2c13;border-color:#bc8e2e;color:#ffe19a}.small{padding:6px 9px;font-size:12px}.wrap{display:grid;grid-template-columns:1fr 390px;gap:10px;padding:10px}.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:12px}.mapShell{position:relative;height:74vh;min-height:540px;overflow:hidden;border-radius:14px;background:#020305;touch-action:none}.mapInner{position:absolute;left:0;top:0;transform-origin:0 0}.mapImg{display:block;width:900px;max-width:none;user-select:none;pointer-events:none}.routeSvg{position:absolute;left:0;top:0;pointer-events:none;overflow:visible}.marker{position:absolute;transform:translate(-50%,-50%);width:38px;height:28px;border:3px solid var(--gold);border-radius:999px;background:#172130;box-shadow:0 3px 0 #0008,0 0 0 2px #0008;display:grid;place-items:center;font-size:16px;cursor:pointer;user-select:none}.marker.anchor{border-color:var(--blue);background:#10233e;font-weight:900}.marker.locked{box-shadow:0 0 0 3px var(--ok),0 3px 0 #0008}.marker.done{opacity:.55;border-color:var(--ok)}.marker.selected{outline:3px solid #fff}.legend{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.pill{display:inline-block;font-size:12px;background:#1b2638;border:1px solid var(--line);border-radius:999px;padding:5px 8px;margin:2px}.list{max-height:60vh;overflow:auto}.item{border:1px solid var(--line);background:#0f1623;border-radius:12px;padding:10px;margin:8px 0}.item h3{margin:0 0 5px;font-size:15px}.stars{color:var(--gold)}.modal{position:fixed;inset:0;background:#0009;display:none;z-index:60;align-items:center;justify-content:center;padding:16px}.modal.show{display:flex}.modalBox{background:var(--panel);border:1px solid var(--line);border-radius:18px;max-width:720px;width:100%;max-height:90vh;overflow:auto;padding:16px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.field{display:flex;flex-direction:column;gap:5px;margin:8px 0}.field label{font-size:12px;color:var(--muted)}textarea{min-height:90px}.adminHint{border:1px dashed var(--gold);padding:10px;border-radius:12px;color:#f6da8a;background:#34270655;margin:8px 0}.coord{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;color:#cfe1ff;font-size:12px}.anchorRow{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;border:1px solid var(--line);border-radius:10px;padding:8px;margin:6px 0;background:#0f1623}.badge{display:inline-grid;place-items:center;width:24px;height:24px;border-radius:50%;background:var(--gold);color:#111;font-weight:900;margin-right:6px}.ok{color:var(--ok)}.danger{color:var(--danger)}.crosshair{position:absolute;inset:0;pointer-events:none;display:none;z-index:20}.crosshair.on{display:block}.crosshair:before,.crosshair:after{content:"";position:absolute;background:#fff;box-shadow:0 0 0 1px #000}.crosshair:before{left:50%;top:calc(50% - 28px);width:2px;height:56px}.crosshair:after{top:50%;left:calc(50% - 28px);height:2px;width:56px}.centerDot{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:16px;height:16px;border:2px solid var(--gold);border-radius:50%;background:#0008}.floatCtl{position:absolute;left:12px;bottom:12px;z-index:25;display:none;max-width:360px}.floatCtl.on{display:block}.zoomBox{position:absolute;right:12px;top:12px;z-index:25;display:flex;flex-direction:column;gap:6px}.zoomBox button{padding:8px 11px}.source{font-size:12px;line-height:1.45}.source a,a{color:#9ecbff}.progress{height:8px;border-radius:99px;background:#26344c;overflow:hidden}.progress span{display:block;height:100%;background:var(--gold)}@media(max-width:900px){.wrap{display:block}.card{margin-bottom:10px}.mapShell{height:62vh;min-height:430px}.mapImg{width:760px}.grid2{grid-template-columns:1fr}}
</style></head><body><header><h1>Dragon's Dogma II Companion <span class="muted">v2.0 • crosshair kalibratie • Teun OP-basis</span></h1><div class="sub">PS5 • spoilers aan • start: Fighter • focus: beste loot, snel sterker worden, weinig backtracking</div><div class="bar"><button id="tabRoute" class="active">⭐ OP Route</button><button id="tabAll">🗺️ 100% Map</button><button id="tabWiki">🌐 Wiki/Data</button><button id="resetView">Kaart reset</button><button id="adminBtn">Admin</button><button id="calBtn">Kalibratie</button><select id="vocation"><option>Fighter</option><option>Warrior</option><option>Thief</option><option>Archer</option><option>Mage</option><option>Sorcerer</option><option>Mystic Spearhand</option><option>Magick Archer</option><option>Trickster</option><option>Warfarer</option></select><select id="typeFilter"><option value="all">Alle types</option><option value="settlement">Nederzetting</option><option value="city">Stad</option><option value="dungeon">Dungeon</option><option value="quest">Quest</option><option value="boss">Boss</option><option value="vocation">Vocation</option><option value="collectible">Collectible</option><option value="merchant">Merchant</option><option value="camp">Camp</option><option value="endgame">Endgame</option></select><input id="search" placeholder="Zoek locatie, wapen, quest, boss..."></div></header><div class="wrap"><main class="card"><div class="mapShell" id="mapShell"><div class="mapInner" id="mapInner"><img src="assets/world-map.png" class="mapImg" id="mapImg" alt="Dragon's Dogma II world map"><svg class="routeSvg" id="routeSvg"></svg><div id="markers"></div></div><div class="crosshair" id="crosshair"><div class="centerDot"></div></div><div class="zoomBox"><button id="zIn">+</button><button id="zOut">−</button></div><div class="floatCtl card" id="floatCtl"><b id="placingTitle">Ankerpunt plaatsen</b><p class="muted">Beweeg/zoom de kaart totdat de exacte locatie onder het kruis staat.</p><div class="bar"><button class="good" id="placeCenter">Zet anker op kruis</button><button id="cancelPlace">Annuleer</button></div></div></div><div class="legend" id="legend"></div></main><aside class="card"><div id="side"></div></aside></div><div class="modal" id="modal"><div class="modalBox"><div id="modalContent"></div><div class="bar"><button id="closeModal">Sluiten</button></div></div></div><script>

{id:'borderwatch',name:'Borderwatch Outpost',type:'settlement',region:'Vermund',x:49,y:28,lvl:1,stars:4,tags:['Vroege shops','Pawn Riftstone'],desc:'Eerste veilige hub na de proloog. Goed punt om pawns te wisselen.',route:2,wiki:'Borderwatch+Outpost'},
{id:'vernworth',name:'Vernworth',type:'city',region:'Vermund',x:52,y:50,lvl:8,stars:5,tags:['Hoofdstad','Shops','Brant quests'],desc:'Belangrijkste vroege hub. Koop/upgrade Fighter gear en start Brant quests.',route:3,wiki:'Vernworth'},
{id:'vocationguild',name:'Vernworth Vocation Guild',type:'vocation',region:'Vermund',x:53,y:49,lvl:8,stars:5,tags:['Vocations','Skills'],desc:'Wissel vocation, koop skills en unlock later Warrior/Sorcerer.',route:4,wiki:'Vocations'},
{id:'trevo',name:'Trevo Mine',type:'dungeon',region:'Vermund',x:42,y:39,lvl:10,stars:5,tags:['Vocation unlock','Dungeon','Early loot'],desc:'Top vroege dungeon. Belangrijk voor Warrior/Sorcerer unlock en vroege powerspike.',route:5,loot:['Vroege greatsword/archistaff-route','Goud/materialen','Dungeon chest loot'],bosses:['Goblins','Ogre/Cyclops afhankelijk van route'],wiki:'Trevo+Mine'},
{id:'nameless',name:'Nameless Village',type:'quest',region:'Vermund',x:61,y:41,lvl:12,stars:4,tags:['Thief','Quest'],desc:'Sterke questlijn voor Thief-info en completion.',route:6,wiki:'Nameless+Village'},
{id:'harve',name:'Harve Village',type:'settlement',region:'Vermund',x:45,y:62,lvl:10,stars:4,tags:['Kust','Quests'],desc:'Kustdorp met quests en goede tussenstop.',route:7,wiki:'Harve+Village'},
{id:'checkrest',name:'Checkpoint Rest Town',type:'settlement',region:'West Vermund',x:31,y:56,lvl:18,stars:5,tags:['Grens','Shops','Sphinx route'],desc:'Belangrijke grenshub richting Battahl.',route:8,wiki:'Checkpoint+Rest+Town'},
{id:'battahl',name:'Bakbattahl',type:'city',region:'Battahl',x:29,y:74,lvl:25,stars:5,tags:['Hoofdstad Battahl','Sterke gear'],desc:'Hier koop je een grote gear-upgrade. Voor Fighter vaak een flinke powerspike.',route:9,wiki:'Bakbattahl'},
{id:'volcanic',name:'Volcanic Island Camp',type:'camp',region:'Agamen Volcanic Island',x:66,y:83,lvl:35,stars:5,tags:['Endgame gear','Hot springs'],desc:'Sterke gear en late-game routes.',route:10,wiki:'Volcanic+Island+Camp'},
{id:'sacred',name:'Sacred Arbor',type:'settlement',region:'Vermund',x:54,y:16,lvl:18,stars:4,tags:['Elf gebied','Archer/Mage'],desc:'Verborgen nederzetting, nuttig voor elfse quests en gear.',wiki:'Sacred+Arbor'},
{id:'misty',name:'Misty Marshes',type:'area',region:'Vermund',x:42,y:31,lvl:16,stars:4,tags:['Gevaarlijk','Loot'],desc:'Mistig gebied met gevaarlijke encounters en interessante loot.',wiki:'Misty+Marshes'},

{id:'sphinx',name:'Sphinx Shrine route',type:'quest',region:'Vermund/Battahl',x:25,y:51,lvl:20,stars:5,tags:['Riddles','Missable'],desc:'Spoilers aan: handig om met checklist te doen zodat je geen beloning mist.',wiki:'Sphinx'},
{id:'dragonsbreath',name:'Drake encounter route',type:'boss',region:'Vermund',x:58,y:58,lvl:25,stars:5,tags:['Dragonforging','Wyrmslife Crystals'],desc:'Niet te vroeg forceren, maar belangrijk voor later krachtiger gear.',wiki:'Drake'},
{id:'bakgear',name:'Bakbattahl gear-upgrade',type:'loot',region:'Battahl',x:29,y:74,lvl:25,stars:5,tags:['Fighter','Koop gear'],desc:'Voor jouw speelstijl: zodra je Battahl veilig bereikt, check shops voor grote powerspike.',vocations:['Fighter','Warrior'],wiki:'Armor'},
{id:'warriorunlock',name:'Warrior/Sorcerer unlock',type:'vocation',region:'Vermund',x:42,y:39,lvl:10,stars:5,tags:['Vocation unlock','Trevo Mine'],desc:'Haal de benodigde wapens terug voor de vocation quest.',vocations:['Fighter','Warrior','Sorcerer'],wiki:'Vocation+Frustration'},
{id:'mystic',name:'Mystic Spearhand unlock',type:'vocation',region:'Vermund',x:58,y:20,lvl:12,stars:5,tags:['Vocation','Melve'],desc:'Sterke hybride vocation. Interessant als je na Fighter iets sneller en spectaculairder wil.',vocations:['Mystic Spearhand'],wiki:'Mystic+Spearhand'},
{id:'magickarcher',name:'Magick Archer unlock',type:'vocation',region:'Volcanic Island',x:66,y:83,lvl:35,stars:5,tags:['Late vocation'],desc:'Late unlockroute bij Volcanic Island. Supersterk voor ranged/magic comfort.',vocations:['Magick Archer'],wiki:'Magick+Archer'},
{id:'warfarer',name:'Warfarer unlock',type:'vocation',region:'Volcanic Island',x:65,y:81,lvl:35,stars:5,tags:['Late vocation','Flexible build'],desc:'Laat je wapens combineren. Past goed bij experimenteren met builds.',vocations:['Warfarer'],wiki:'Warfarer'},
{id:'tokenhub',name:'Seeker Token checklist-start',type:'collectible',region:'Vermund',x:50,y:44,lvl:1,stars:4,tags:['Tokens','Collectible'],desc:'Gebruik dit als categorie-marker; exacte tokens voegen we per regio toe na kalibratie.',wiki:'Seeker%27s+Tokens'},
{id:'beetlehub',name:'Golden Trove Beetle route',type:'collectible',region:'Alle regio’s',x:44,y:47,lvl:1,stars:5,tags:['Draaggewicht','OP comfort'],desc:'Belangrijk voor jou: meer draaggewicht betekent langer looten zonder terug naar de stad.',wiki:'Golden+Trove+Beetle'},
{id:'ferrystonehub',name:'Ferrystone/Portcrystal planning',type:'collectible',region:'Alle regio’s',x:51,y:52,lvl:1,stars:5,tags:['Fast travel','Minder backtracking'],desc:'Past bij jouw doel: minder onnodig heen en weer lopen.',wiki:'Ferrystone'}
];
let saved=JSON.parse(localStorage.getItem('dd2_v2')||'{}');let locations=(saved.locations||starter).map(l=>({...l}));let done=saved.done||{};let tab=saved.tab||'route';let admin=!!saved.admin;let cal=!!saved.cal;let placingAnchor=saved.placingAnchor||null;let scale=saved.scale||1,tx=saved.tx||0,ty=saved.ty||0;let drag=null;let markerDrag=null;
const el=id=>document.getElementById(id),shell=el('mapShell'),inner=el('mapInner'),img=el('mapImg'),svg=el('routeSvg');
function save(){localStorage.setItem('dd2_v2',JSON.stringify({locations,done,tab,admin,cal,placingAnchor,scale,tx,ty}))}function base(l){if(l.ox==null){l.ox=l.x;l.oy=l.y}}
function pctToPx(l){return{x:l.x/100*img.width,y:l.y/100*img.height}}function currentCenterPct(){let r=img.getBoundingClientRect(),sr=shell.getBoundingClientRect();return{x:(sr.left+sr.width/2-r.left)/r.width*100,y:(sr.top+sr.height/2-r.top)/r.height*100}}
function render(){setTabs();el('adminBtn').classList.toggle('active',admin);el('calBtn').classList.toggle('active',cal);el('crosshair').classList.toggle('on',!!placingAnchor);el('floatCtl').classList.toggle('on',!!placingAnchor);el('placingTitle').textContent=placingAnchor?'Plaats: '+(locations.find(l=>l.id===placingAnchor)?.name||'anker'):'';renderMarkers();renderSide();renderLegend();drawRoute();applyTransform();save()}
function filtered(){let q=el('search').value.toLowerCase(),tf=el('typeFilter').value,v=el('vocation').value;return locations.filter(l=>{let ok=tab==='route'?(l.route>0||anchorIds.includes(l.id)):true;if(tf!=='all')ok=ok&&l.type===tf;if(q)ok=ok&&(l.name+' '+(l.region||'')+' '+(l.desc||'')+' '+(l.tags||[]).join(' ')).toLowerCase().includes(q);if(l.vocations&&l.vocations.length)ok=ok&&l.vocations.includes(v);return ok})}
function renderMarkers(){let cont=el('markers');cont.innerHTML='';filtered().forEach((l,i)=>{base(l);let p=pctToPx(l),m=document.createElement('div');m.className='marker '+(done[l.id]?'done ':'')+(anchorIds.includes(l.id)?'anchor ':'')+(l.locked?'locked ':'');let markerSize=anchorIds.includes(l.id)?Math.max(16,Math.min(38,38/Math.sqrt(scale))):Math.max(14,Math.min(38,34/Math.sqrt(scale)));m.style.width=markerSize+'px';m.style.height=Math.round(markerSize*.72)+'px';m.style.fontSize=Math.max(10,markerSize*.42)+'px';m.style.left=p.x+'px';m.style.top=p.y+'px';m.textContent=anchorIds.includes(l.id)?(anchorIds.indexOf(l.id)+1):(EMOJI[l.type]||'📍');m.title=l.name;m.onpointerdown=e=>{if(cal&&anchorIds.includes(l.id)){e.stopPropagation();markerDrag={id:l.id,startX:e.clientX,startY:e.clientY,origX:l.x,origY:l.y};m.setPointerCapture(e.pointerId)}};m.onpointermove=e=>{if(markerDrag&&markerDrag.id===l.id){e.stopPropagation();let r=img.getBoundingClientRect();l.x=Math.max(0,Math.min(100,(e.clientX-r.left)/r.width*100));l.y=Math.max(0,Math.min(100,(e.clientY-r.top)/r.height*100));l.locked=true;renderMarkers();drawRoute()}};m.onpointerup=e=>{if(markerDrag){markerDrag=null;save();renderSide()}else openDetails(l)};m.onclick=e=>{if(!markerDrag)openDetails(l)};cont.appendChild(m)})}
function drawRoute(){svg.setAttribute('width',img.width);svg.setAttribute('height',img.height);svg.innerHTML='';let pts=locations.filter(l=>l.route>0&&(tab==='route'||tab==='all')).sort((a,b)=>a.route-b.route).map(pctToPx);for(let i=0;i<pts.length-1;i++){let ln=document.createElementNS('http://www.w3.org/2000/svg','line');ln.setAttribute('x1',pts[i].x);ln.setAttribute('y1',pts[i].y);ln.setAttribute('x2',pts[i+1].x);ln.setAttribute('y2',pts[i+1].y);ln.setAttribute('stroke','#e9bf55');ln.setAttribute('stroke-width','5');ln.setAttribute('opacity','.8');ln.setAttribute('stroke-linecap','round');svg.appendChild(ln)}}
function renderLegend(){el('legend').innerHTML=TYPES.map(t=>`<span class="pill">${EMOJI[t]} ${t}</span>`).join('')+'<span class="pill">🔵 ankerpunt</span>'}
function renderSide(){let side=el('side');if(tab==='wiki'){side.innerHTML=wikiHtml();return}let list=filtered();let doneCount=list.filter(l=>done[l.id]).length;let anchors=anchorIds.map(id=>locations.find(l=>l.id===id)).filter(Boolean);let locked=anchors.filter(a=>a.locked).length;side.innerHTML=`<h2>${cal?'Kalibratie':'Voortgang'}</h2><div class="progress"><span style="width:${list.length?doneCount/list.length*100:0}%"></span></div><p class="muted">${doneCount}/${list.length} zichtbare markers afgevinkt</p>${admin?'<div class="adminHint">Admin aan. In normale admin tik je op de kaart om een marker toe te voegen. In Kalibratie gebruik je de ankers.</div>':''}${cal?calHtml(anchors,locked):mainHtml(list)}`}
function mainHtml(list){return `<p><b>Nu doen:</b> Fighter-route: Melve → Borderwatch → Vernworth → Vocation Guild → Trevo Mine → Checkpoint → Bakbattahl.</p><div class="bar"><button onclick="exportData()">Export</button><button onclick="importData()">Import</button><button onclick="resetData()">Reset data</button></div><div class="list">${list.map(itemHtml).join('')}</div>`}
function calHtml(anchors,locked){return `<div class="adminHint"><b>${locked}/${anchors.length} ankerpunten vastgezet.</b><br>Precies plaatsen: klik bij een anker op <b>Kruis</b>, zoom/pan tot de plek onder het kruis staat en klik <b>Zet anker op kruis</b>. Slepen kan ook.</div><div class="bar"><button class="good" onclick="calibrateAll()">Kalibreer alle markers</button><button onclick="unlockAllAnchors()">Ontgrendel</button><button onclick="restoreOriginalPositions()">Herstel origineel</button></div><div class="list">${anchors.map((a,i)=>`<div class="anchorRow"><div><span class="badge">${i+1}</span><b>${a.name}</b><div class="muted">${anchorWhy[a.id]||''}</div><div class="coord">x ${a.x.toFixed(2)} / y ${a.y.toFixed(2)} ${a.locked?'<span class="ok">• vastgezet</span>':'<span class="danger">• nog niet</span>'}</div></div><div><button class="small ${placingAnchor===a.id?'active':''}" onclick="startPlaceAnchor('${a.id}')">Kruis</button></div></div>`).join('')}</div><div class="adminHint"><b>Beste volgorde:</b><br>1 Melve, 2 Borderwatch, 3 Vernworth, 4 Bakbattahl, 5 Checkpoint Rest Town, 6 Volcanic Island Camp, 7 Harve Village, 8 Sacred Arbor. Daarna Nameless Village en Trevo Mine als extra precisie.</div>`}
function itemHtml(l){return `<div class="item"><label><input type="checkbox" ${done[l.id]?'checked':''} onchange="done['${l.id}']=this.checked;if(!this.checked)delete done['${l.id}'];save();render()"> <b>${EMOJI[l.type]||'📍'} ${l.name}</b></label><div class="muted">${l.region||''} · lvl ${l.lvl||'?'} · <span class="stars">${'★'.repeat(l.stars||3)}</span></div><div>${(l.tags||[]).map(t=>`<span class="pill">${t}</span>`).join(' ')}</div></div>`}
function wikiHtml(){return `<h2>Wiki/Data</h2><p class="source">Ik heb de basis onthouden: deze app blijft gericht op jouw Elden Ring-smaak: uitdagende bazen, open wereld, vaste plekken bezoeken, sterke loot en snel OP worden.</p><div class="adminHint">Volledige vrij beschikbare data wordt niet één-op-één gekopieerd uit commerciële interactieve kaarten. De app gebruikt eigen markerdata + bronlinks. Nieuwe data kunnen we gecontroleerd toevoegen en vertalen.</div><h3>Bronnen</h3>${SOURCES.map(s=>`<div class="item source"><b>${s[0]}</b><br><a target="_blank" href="${s[1]}">${s[1]}</a><br>${s[2]}</div>`).join('')}<h3>Marker-bronlinks</h3><div class="list">${locations.map(l=>`<div class="item"><h3>${l.name}</h3><a target="_blank" href="${WIKI_BASE+(l.wiki||encodeURIComponent(l.name))}">Open wiki/gids</a><div class="muted">${l.desc||''}</div></div>`).join('')}</div>`}
function openDetails(l){el('modalContent').innerHTML=`<h2>${anchorIds.includes(l.id)?'🔵':(EMOJI[l.type]||'📍')} ${l.name}</h2><div class="muted">${l.region||''} · level ${l.lvl||'?'} · <span class="stars">${'★'.repeat(l.stars||3)}</span></div><p>${l.desc||''}</p><p>${(l.tags||[]).map(t=>`<span class="pill">${t}</span>`).join(' ')}</p>${l.loot?`<h3>Loot</h3><ul>${l.loot.map(x=>`<li>${x}</li>`).join('')}</ul>`:''}${l.bosses?`<h3>Bosses</h3><ul>${l.bosses.map(x=>`<li>${x}</li>`).join('')}</ul>`:''}<p><a target="_blank" href="${WIKI_BASE+(l.wiki||encodeURIComponent(l.name))}">Open wiki/gids</a></p><div class="coord">x:${l.x.toFixed(2)} y:${l.y.toFixed(2)} / origineel x:${(l.ox??l.x).toFixed(2)} y:${(l.oy??l.y).toFixed(2)}</div><div class="bar"><button onclick="done['${l.id}']=!done['${l.id}'];if(!done['${l.id}'])delete done['${l.id}'];save();render();openDetails(locations.find(a=>a.id==='${l.id}'))">${done[l.id]?'Markeer open':'Markeer gedaan'}</button>${admin?`<button onclick="editMarker('${l.id}')">Bewerk</button><button onclick="deleteMarker('${l.id}')">Verwijder</button>`:''}${cal&&anchorIds.includes(l.id)?`<button onclick="startPlaceAnchor('${l.id}')">Plaats met kruis</button>`:''}</div>`;el('modal').classList.add('show')}
function startPlaceAnchor(id){placingAnchor=id;cal=true;admin=true;el('modal').classList.remove('show');render()}function placeCenter(){if(!placingAnchor)return;let c=currentCenterPct();setAnchorAt(placingAnchor,c.x,c.y)}function setAnchorAt(id,x,y){let l=locations.find(a=>a.id===id);if(!l)return;base(l);l.x=Math.max(0,Math.min(100,x));l.y=Math.max(0,Math.min(100,y));l.locked=true;placingAnchor=null;save();render()}
function calibrateAll(){let anchors=anchorIds.map(id=>locations.find(l=>l.id===id)).filter(a=>a&&a.locked);if(anchors.length<3){alert('Minimaal 3 ankerpunten nodig. Gebruik liever 6–8.');return}locations.forEach(l=>{base(l);if(anchorIds.includes(l.id)&&l.locked)return;let sum=0,dx=0,dy=0;anchors.forEach(a=>{base(a);let d=Math.hypot(l.ox-a.ox,l.oy-a.oy);let w=1/Math.pow(Math.max(d,0.001),2);dx+=(a.x-a.ox)*w;dy+=(a.y-a.oy)*w;sum+=w});l.x=Math.max(0,Math.min(100,l.ox+dx/sum));l.y=Math.max(0,Math.min(100,l.oy+dy/sum))});save();render();alert('Kalibratie toegepast. Exporteer daarna je data voor vaste GitHub-coördinaten.')}
function unlockAllAnchors(){locations.forEach(l=>{if(anchorIds.includes(l.id))l.locked=false});save();render()}function restoreOriginalPositions(){if(confirm('Alle markers terug naar originele basispositie?')){locations.forEach(l=>{base(l);l.x=l.ox;l.y=l.oy;l.locked=false});placingAnchor=null;save();render()}}
function editMarker(id){let l=locations.find(a=>a.id===id);markerForm(l)}function markerForm(l){let isNew=!l;l=l||{id:'m'+Date.now(),name:'Nieuwe marker',type:'quest',region:'',x:50,y:50,lvl:1,stars:3,tags:[],desc:'',route:0,wiki:''};base(l);el('modalContent').innerHTML=`<h2>${isNew?'Nieuwe':'Bewerk'} marker</h2><div class="grid2"><div class="field"><label>Naam</label><input id="f_name" value="${esc(l.name)}"></div><div class="field"><label>Type</label><select id="f_type">${TYPES.map(t=>`<option ${l.type===t?'selected':''}>${t}</option>`).join('')}</select></div><div class="field"><label>Regio</label><input id="f_region" value="${esc(l.region||'')}"></div><div class="field"><label>Level</label><input id="f_lvl" type="number" value="${l.lvl||1}"></div><div class="field"><label>X %</label><input id="f_x" type="number" step="0.01" value="${l.x}"></div><div class="field"><label>Y %</label><input id="f_y" type="number" step="0.01" value="${l.y}"></div><div class="field"><label>Routevolgorde</label><input id="f_route" type="number" value="${l.route||0}"></div><div class="field"><label>Sterren 1-5</label><input id="f_stars" type="number" min="1" max="5" value="${l.stars||3}"></div></div><div class="field"><label>Tags komma-gescheiden</label><input id="f_tags" value="${esc((l.tags||[]).join(', '))}"></div><div class="field"><label>Beschrijving</label><textarea id="f_desc">${esc(l.desc||'')}</textarea></div><div class="field"><label>Wiki slug/zoekterm</label><input id="f_wiki" value="${esc(l.wiki||l.name)}"></div><div class="bar"><button onclick="saveMarker('${l.id}',${isNew})">Opslaan</button></div>`;el('modal').classList.add('show')}
function saveMarker(id,isNew){let old=locations.find(a=>a.id===id)||{};let l={...old,id,name:el('f_name').value,type:el('f_type').value,region:el('f_region').value,x:+el('f_x').value,y:+el('f_y').value,lvl:+el('f_lvl').value,route:+el('f_route').value,stars:+el('f_stars').value,tags:el('f_tags').value.split(',').map(s=>s.trim()).filter(Boolean),desc:el('f_desc').value,wiki:el('f_wiki').value};if(l.ox==null){l.ox=l.x;l.oy=l.y}if(isNew)locations.push(l);else locations=locations.map(a=>a.id===id?l:a);save();el('modal').classList.remove('show');render()}function deleteMarker(id){if(confirm('Marker verwijderen?')){locations=locations.filter(l=>l.id!==id);delete done[id];save();el('modal').classList.remove('show');render()}}
function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function applyTransform(){inner.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`}function resetView(){scale=1;tx=0;ty=0;applyTransform();save()}function zoomAt(f){let old=scale;scale=Math.min(8,Math.max(.5,scale*f));let rect=shell.getBoundingClientRect(),mx=rect.width/2,my=rect.height/2;tx=mx-(mx-tx)*(scale/old);ty=my-(my-ty)*(scale/old);applyTransform();renderMarkers();save()}
shell.addEventListener('pointerdown',e=>{if(markerDrag)return;drag={x:e.clientX,y:e.clientY,tx,ty,moved:false};shell.setPointerCapture(e.pointerId)});shell.addEventListener('pointermove',e=>{if(markerDrag)return;if(!drag)return;let dx=e.clientX-drag.x,dy=e.clientY-drag.y;if(Math.abs(dx)+Math.abs(dy)>3)drag.moved=true;tx=drag.tx+dx;ty=drag.ty+dy;applyTransform()});shell.addEventListener('pointerup',e=>{let was=drag;drag=null;if(was&&!was.moved&&!placingAnchor){let r=img.getBoundingClientRect();let x=(e.clientX-r.left)/r.width*100,y=(e.clientY-r.top)/r.height*100;if(x>=0&&x<=100&&y>=0&&y<=100&&admin&&!cal)markerForm({id:'m'+Date.now(),name:'Nieuwe marker',type:'quest',region:'',x,y,ox:x,oy:y,lvl:1,stars:3,tags:[],desc:'',route:0,wiki:''})}});
shell.addEventListener('wheel',e=>{e.preventDefault();let old=scale;scale=Math.min(8,Math.max(.5,scale*(e.deltaY<0?1.12:.88)));let rect=shell.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top;tx=mx-(mx-tx)*(scale/old);ty=my-(my-ty)*(scale/old);applyTransform();renderMarkers();save()},{passive:false});
function exportData(){let blob=new Blob([JSON.stringify({version:'2.0',locations,done},null,2)],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='dd2-companion-data-v2.json';a.click()}function importData(){let i=document.createElement('input');i.type='file';i.accept='.json';i.onchange=()=>{let f=i.files[0],r=new FileReader();r.onload=()=>{let d=JSON.parse(r.result);locations=d.locations||locations;done=d.done||done;locations.forEach(base);save();render()};r.readAsText(f)};i.click()}function resetData(){if(confirm('Lokale data terugzetten naar startset?')){locations=starter.map(l=>({...l}));done={};placingAnchor=null;save();render()}}
el('placeCenter').onclick=placeCenter;el('cancelPlace').onclick=()=>{placingAnchor=null;render()};el('zIn').onclick=()=>zoomAt(1.2);el('zOut').onclick=()=>zoomAt(.83);el('tabRoute').onclick=()=>{tab='route';cal=false;placingAnchor=null;setTabs();render()};el('tabAll').onclick=()=>{tab='all';cal=false;placingAnchor=null;setTabs();render()};el('tabWiki').onclick=()=>{tab='wiki';cal=false;placingAnchor=null;setTabs();render()};function setTabs(){el('tabRoute').classList.toggle('active',tab==='route');el('tabAll').classList.toggle('active',tab==='all');el('tabWiki').classList.toggle('active',tab==='wiki')}el('resetView').onclick=resetView;el('adminBtn').onclick=()=>{admin=!admin;render()};el('calBtn').onclick=()=>{cal=!cal;if(cal)admin=true;if(!cal)placingAnchor=null;render()};el('closeModal').onclick=()=>el('modal').classList.remove('show');el('search').oninput=render;el('typeFilter').onchange=render;el('vocation').onchange=render;img.onload=()=>{svg.setAttribute('width',img.width);svg.setAttribute('height',img.height);locations.forEach(base);render();applyTransform()};if(img.complete)img.onload();if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script></body></html>
