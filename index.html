<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#090d14" />
<link rel="manifest" href="manifest.webmanifest">
<title>Dragon's Dogma II Companion</title>
<style>
:root{--bg:#080d14;--panel:#121a27;--panel2:#192437;--line:#2d3b52;--text:#eef4ff;--muted:#9ba7b8;--gold:#e9bf55;--ok:#54d68a;--danger:#ff7474}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}header{padding:12px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#070b12f5;z-index:10}h1{font-size:18px;margin:0 0 4px}.sub{font-size:12px;color:var(--muted)}.bar{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}button,select,input,textarea{border:1px solid var(--line);background:var(--panel2);color:var(--text);border-radius:12px;padding:10px 12px;font-weight:700}button.active{background:var(--gold);color:#18110a;border-color:#f7d87b}button.small{padding:7px 9px;font-size:12px}input,select{font-weight:500;min-width:150px}.wrap{display:grid;grid-template-columns:1fr 380px;gap:10px;padding:10px}.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:12px}.mapShell{position:relative;height:72vh;min-height:520px;overflow:hidden;border-radius:14px;background:#020305;touch-action:none}.mapInner{position:absolute;left:0;top:0;transform-origin:0 0}.mapImg{display:block;width:900px;max-width:none;user-select:none;pointer-events:none}.marker{position:absolute;transform:translate(-50%,-50%);width:42px;height:30px;border:3px solid var(--gold);border-radius:999px;background:#172130;box-shadow:0 3px 0 #0008,0 0 0 2px #0008;display:grid;place-items:center;font-size:17px;cursor:pointer}.marker.done{border-color:var(--ok);opacity:.65}.marker.selected{outline:3px solid #fff}.routeSvg{position:absolute;left:0;top:0;pointer-events:none;overflow:visible}.legend{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.pill{font-size:12px;background:#1b2638;border:1px solid var(--line);border-radius:999px;padding:5px 8px}.list{max-height:58vh;overflow:auto}.item{border:1px solid var(--line);background:#0f1623;border-radius:12px;padding:10px;margin:8px 0}.item h3{margin:0 0 5px;font-size:15px}.muted{color:var(--muted);font-size:12px}.stars{color:var(--gold)}.modal{position:fixed;inset:0;background:#0009;display:none;z-index:50;align-items:center;justify-content:center;padding:16px}.modal.show{display:flex}.modalBox{background:var(--panel);border:1px solid var(--line);border-radius:18px;max-width:560px;width:100%;max-height:90vh;overflow:auto;padding:16px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.field{display:flex;flex-direction:column;gap:5px;margin:8px 0}.field label{font-size:12px;color:var(--muted)}textarea{min-height:90px;font-weight:500}.help{line-height:1.45}.adminHint{border:1px dashed var(--gold);padding:8px;border-radius:12px;color:#f5d98b;background:#34270655;margin:8px 0}.coord{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;color:#cfe1ff;font-size:12px}@media(max-width:900px){.wrap{display:block}.card{margin-bottom:10px}.mapShell{height:62vh;min-height:420px}.mapImg{width:760px}.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
 <h1>Dragon's Dogma II Companion <span class="muted">v1.1 • PS5 • spoilers aan</span></h1>
 <div class="sub">Repository: Teunuzzz/Dragons_Domga_II • kaart met echte klik-coördinaten + admin editor</div>
 <div class="bar">
  <button id="tabRoute" class="active">⭐ OP Route</button><button id="tabAll">🗺️ 100% Map</button><button id="tabWiki">🌐 Wiki-bronnen</button>
  <button id="resetView">Kaart reset</button><button id="adminBtn">Admin</button>
  <select id="vocation"><option>Fighter</option><option>Warrior</option><option>Thief</option><option>Archer</option><option>Mage</option><option>Sorcerer</option><option>Mystic Spearhand</option><option>Magick Archer</option><option>Trickster</option><option>Warfarer</option></select>
  <select id="typeFilter"><option value="all">Alle types</option><option value="settlement">Nederzetting</option><option value="city">Stad</option><option value="dungeon">Dungeon</option><option value="quest">Quest</option><option value="boss">Boss</option><option value="vocation">Vocation</option><option value="collectible">Collectible</option><option value="merchant">Merchant</option><option value="camp">Camp</option><option value="endgame">Endgame</option></select>
  <input id="search" placeholder="Zoek locatie, wapen, quest, boss..." />
 </div>
</header>
<div class="wrap">
 <main class="card">
  <div class="mapShell" id="mapShell"><div class="mapInner" id="mapInner"><img src="assets/world-map.png" class="mapImg" id="mapImg" alt="Dragon's Dogma II world map"><svg class="routeSvg" id="routeSvg"></svg><div id="markers"></div></div></div>
  <div class="legend"><span class="pill">🏘️ settlement</span><span class="pill">🏰 city</span><span class="pill">🕳️ dungeon</span><span class="pill">📜 quest</span><span class="pill">👹 boss</span><span class="pill">🧙 vocation</span><span class="pill">🪲 collectible</span><span class="pill">🛒 merchant</span></div>
 </main>
 <aside class="card">
  <div id="side"></div>
 </aside>
</div>
<div class="modal" id="modal"><div class="modalBox"><div id="modalContent"></div><div class="bar"><button id="closeModal">Sluiten</button></div></div></div>
<script>
const WIKI_BASE='https://dragonsdogma2.wiki.fextralife.com/';
const EMOJI={settlement:'🏘️',city:'🏰',dungeon:'🕳️',quest:'📜',boss:'👹',vocation:'🧙',collectible:'🪲',merchant:'🛒',camp:'🏕️',endgame:'🐉',area:'🗺️'};
const starter=[
{id:'melve',name:'Melve',type:'settlement',region:'Vermund',x:58,y:20,lvl:1,stars:5,tags:['Startgebied','Inn','vroege quests'],desc:'Startgebied. Pak vroege quests en rust uit voordat je naar Vernworth gaat.',route:1,loot:['Vroege gear-upgrades','Wakestone Shards via omgeving'],wiki:'Melve'},
{id:'borderwatch',name:'Borderwatch Outpost',type:'settlement',region:'Vermund',x:49,y:28,lvl:1,stars:4,tags:['Vroege shops','Pawn Riftstone'],desc:'Eerste veilige hub na de proloog. Goed punt om pawns te wisselen.',route:2,wiki:'Borderwatch+Outpost'},
{id:'vernworth',name:'Vernworth',type:'city',region:'Vermund',x:52,y:50,lvl:8,stars:5,tags:['Hoofdstad','Shops','Brant quests'],desc:'Belangrijkste vroege hub. Koop/upgrade Fighter gear en start Brant quests.',route:3,wiki:'Vernworth'},
{id:'vocationguild',name:'Vernworth Vocation Guild',type:'vocation',region:'Vermund',x:53,y:49,lvl:8,stars:5,tags:['Vocations','Skills'],desc:'Wissel vocation, koop skills en unlock later Warrior/Sorcerer via de bijbehorende quest.',route:4,wiki:'Vocation+Guild'},
{id:'trevo',name:'Trevo Mine',type:'dungeon',region:'Vermund',x:42,y:39,lvl:10,stars:5,tags:['Vocation unlock','Dungeon','Early loot'],desc:'Top vroege dungeon. Belangrijk voor Warrior/Sorcerer unlock. Neem olie/lantaarn mee.',route:5,loot:['Greatsword-achtige vroege loot','Archistaff-achtige vroege loot','Goud/materialen'],bosses:['Goblins','Ogre/Cyclops afhankelijk van route'],wiki:'Trevo+Mine'},
{id:'nameless',name:'Nameless Village',type:'quest',region:'Vermund',x:61,y:41,lvl:12,stars:4,tags:['Thief','Quest'],desc:'Sterke questlijn voor Thief-info en later nuttig voor completion.',route:6,wiki:'Nameless+Village'},
{id:'harve',name:'Harve Village',type:'settlement',region:'Vermund',x:45,y:62,lvl:10,stars:4,tags:['Kust','Quests'],desc:'Kustdorp met quests en goede tussenstop.',route:7,wiki:'Harve+Village'},
{id:'checkrest',name:'Checkpoint Rest Town',type:'settlement',region:'West Vermund',x:31,y:56,lvl:18,stars:5,tags:['Grens','Shops','Sphinx route'],desc:'Belangrijke grenshub richting Battahl. Goed koop- en rustpunt.',route:8,wiki:'Checkpoint+Rest+Town'},
{id:'battahl',name:'Bakbattahl',type:'city',region:'Battahl',x:29,y:74,lvl:25,stars:5,tags:['Hoofdstad Battahl','Sterke gear'],desc:'Hier koop je een grote gear-upgrade. Voor Fighter vaak een flinke powerspike.',route:9,wiki:'Bakbattahl'},
{id:'volcanic',name:'Volcanic Island Camp',type:'camp',region:'Agamen Volcanic Island',x:66,y:83,lvl:35,stars:5,tags:['Endgame gear','Hot springs'],desc:'Sterke gear en late-game routes. Ga hier later heen voor grote upgrades.',route:10,wiki:'Volcanic+Island+Camp'},
{id:'dragon',name:'Endgame / Unmoored World',type:'endgame',region:'Endgame',x:77,y:74,lvl:45,stars:5,tags:['Spoilers','Endgame'],desc:'Spoilers aan: late-game/endgame focus. Gebruik dit pas als je verhaal verder is.',route:11,wiki:'Unmoored+World'},
{id:'sacred',name:'Sacred Arbor',type:'settlement',region:'Vermund',x:54,y:16,lvl:18,stars:4,tags:['Elf gebied','Archer/Mage'],desc:'Verborgen nederzetting, nuttig voor elfse quests en gear.',route:0,wiki:'Sacred+Arbor'},
{id:'misty',name:'Misty Marshes',type:'area',region:'Vermund',x:42,y:31,lvl:16,stars:4,tags:['Gevaarlijk','Loot'],desc:'Mistig gebied met gevaarlijke encounters en interessante loot.',route:0,wiki:'Misty+Marshes'},
{id:'waterfall',name:'Waterfall Cave',type:'dungeon',region:'Vermund',x:65,y:28,lvl:15,stars:4,tags:['Dungeon','Loot'],desc:'Goede vroege dungeon voor loot en materials.',route:0,wiki:'Waterfall+Cave'},
{id:'medusa',name:'Medusa gebied',type:'boss',region:'Battahl',x:22,y:72,lvl:30,stars:4,tags:['Boss','Special drops'],desc:'Sterke boss encounter. Kom voorbereid terug.',route:0,wiki:'Medusa'},
{id:'sphinx',name:'Sphinx route',type:'quest',region:'West Vermund',x:23,y:37,lvl:20,stars:5,tags:['Riddles','Unieke beloningen'],desc:'Spoiler-aan route voor unieke beloningen. Volg wiki-link exact als je niets wilt missen.',route:0,wiki:'Sphinx'},
{id:'seeker1',name:'Vroege Seeker Token cluster',type:'collectible',region:'Vermund',x:50,y:35,lvl:1,stars:3,tags:['Seeker Tokens'],desc:'Gebruik als reminder: zet exacte tokens via Admin wanneer je ze vindt.',route:0,wiki:'Seeker+Tokens'},
{id:'beetle1',name:'Golden Trove Beetle cluster',type:'collectible',region:'Vermund',x:48,y:44,lvl:1,stars:5,tags:['Draaggewicht'],desc:'Beetles verhogen draaggewicht. Prioriteit voor jouw speelstijl.',route:0,wiki:'Golden+Trove+Beetle'},
{id:'merchant1',name:'Vroege Fighter merchant',type:'merchant',region:'Vernworth',x:52,y:51,lvl:8,stars:5,tags:['Fighter gear'],desc:'Koop eerst wapenupgrade, daarna armor. Upgrade bij smith zodra materialen/goud er zijn.',route:0,wiki:'Merchants'}
];
let locations=JSON.parse(localStorage.dd2_locations||'null')||starter;
let done=JSON.parse(localStorage.dd2_done||'{}');
let admin=localStorage.dd2_admin==='1';
let tab='route', selected=null, scale=1, tx=0, ty=0, drag=null;
const el=id=>document.getElementById(id), shell=el('mapShell'), inner=el('mapInner'), img=el('mapImg'), markers=el('markers'), svg=el('routeSvg');
function save(){localStorage.dd2_locations=JSON.stringify(locations);localStorage.dd2_done=JSON.stringify(done);localStorage.dd2_admin=admin?'1':'0'}
function filt(){const q=el('search').value.toLowerCase(), t=el('typeFilter').value, voc=el('vocation').value;return locations.filter(l=>(tab==='route'?l.route>0:true)&&(t==='all'||l.type===t)&&(!q||JSON.stringify(l).toLowerCase().includes(q))&&(!l.vocations||l.vocations.includes(voc)))}
function render(){renderMarkers();renderRoute();renderSide()}
function renderMarkers(){markers.innerHTML='';filt().forEach(l=>{let d=document.createElement('button');d.className='marker '+(done[l.id]?'done ':'')+(selected===l.id?'selected':'');d.style.left=l.x+'%';d.style.top=l.y+'%';d.title=l.name;d.innerHTML=EMOJI[l.type]||'📍';d.onclick=e=>{e.stopPropagation();selected=l.id;openDetails(l);render()};markers.appendChild(d)})}
function renderRoute(){svg.innerHTML='';svg.setAttribute('width',img.naturalWidth||900);svg.setAttribute('height',img.naturalHeight||1152);if(tab!=='route')return;let r=locations.filter(l=>l.route>0).sort((a,b)=>a.route-b.route);let pts=r.map(l=>`${l.x/100*(img.width||900)},${l.y/100*(img.height||1152)}`).join(' ');let p=document.createElementNS('http://www.w3.org/2000/svg','polyline');p.setAttribute('points',pts);p.setAttribute('fill','none');p.setAttribute('stroke','#e9bf55');p.setAttribute('stroke-width','5');p.setAttribute('stroke-linejoin','round');p.setAttribute('opacity','.85');svg.appendChild(p)}
function renderSide(){let fs=filt();let total=locations.length, checked=Object.keys(done).length;el('side').innerHTML= tab==='wiki'?wikiHtml():`<h2>Voortgang</h2><div class="muted">${checked}/${total} markers afgevinkt</div><div class="adminHint" style="display:${admin?'block':'none'}">Admin aan: tik op de kaart om een marker toe te voegen. Coördinaten worden automatisch gezet.</div><p class="muted"><b>Nu doen:</b> speel ${el('vocation').value}. Volg de gouden route: Melve → Borderwatch → Vernworth → Vocation Guild → Trevo Mine → Checkpoint → Bakbattahl.</p><div class="bar"><button class="small" onclick="exportData()">Export</button><button class="small" onclick="importData()">Import</button><button class="small" onclick="resetData()">Reset data</button></div><div class="list">${fs.map(l=>itemHtml(l)).join('')}</div><p class="muted">Tip: staan markers verkeerd, zet Admin aan en verplaats/verwijder ze. Nieuwe coördinaten worden in je browser opgeslagen.</p>`}
function itemHtml(l){return `<div class="item"><label><input type="checkbox" ${done[l.id]?'checked':''} onchange="done['${l.id}']=this.checked; if(!this.checked) delete done['${l.id}']; save(); render()"> <b>${EMOJI[l.type]||'📍'} ${l.name}</b></label><div class="muted">${l.region||''} · lvl ${l.lvl||'?'} · <span class="stars">${'★'.repeat(l.stars||3)}</span></div><div>${(l.tags||[]).map(t=>`<span class="pill">${t}</span>`).join(' ')}</div></div>`}
function wikiHtml(){return `<h2>Wiki-bronnen</h2><p class="help">Deze app kopieert geen commerciële interactieve kaartdatabase. Per marker staat een directe bronlink zodat je details kunt raadplegen. De markerdata is je eigen lokale database.</p><div class="list">${locations.map(l=>`<div class="item"><h3>${l.name}</h3><a style="color:#9ecbff" target="_blank" href="${WIKI_BASE+(l.wiki||encodeURIComponent(l.name))}">Open wiki/gids</a><div class="muted">${l.desc||''}</div></div>`).join('')}</div>`}
function openDetails(l){el('modalContent').innerHTML=`<h2>${EMOJI[l.type]||'📍'} ${l.name}</h2><div class="muted">${l.region||''} · aanbevolen level ${l.lvl||'?'} · <span class="stars">${'★'.repeat(l.stars||3)}</span></div><p>${l.desc||''}</p><p>${(l.tags||[]).map(t=>`<span class="pill">${t}</span>`).join(' ')}</p>${l.loot?`<h3>Loot</h3><ul>${l.loot.map(x=>`<li>${x}</li>`).join('')}</ul>`:''}${l.bosses?`<h3>Bosses</h3><ul>${l.bosses.map(x=>`<li>${x}</li>`).join('')}</ul>`:''}<p><a style="color:#9ecbff" target="_blank" href="${WIKI_BASE+(l.wiki||encodeURIComponent(l.name))}">Open wiki/gids</a></p><div class="coord">x:${l.x.toFixed(2)} y:${l.y.toFixed(2)}</div><div class="bar"><button onclick="done['${l.id}']=!done['${l.id}']; if(!done['${l.id}']) delete done['${l.id}']; save(); render(); openDetails(locations.find(a=>a.id==='${l.id}'))">${done[l.id]?'Markeer open':'Markeer gedaan'}</button>${admin?`<button onclick="editMarker('${l.id}')">Bewerk</button><button onclick="deleteMarker('${l.id}')">Verwijder</button>`:''}</div>`;el('modal').classList.add('show')}
function editMarker(id){let l=locations.find(a=>a.id===id);markerForm(l)}
function markerForm(l){let isNew=!l;l=l||{id:'m'+Date.now(),name:'Nieuwe marker',type:'loot',region:'',x:50,y:50,lvl:1,stars:3,tags:[],desc:'',route:0,wiki:''};el('modalContent').innerHTML=`<h2>${isNew?'Nieuwe':'Bewerk'} marker</h2><div class="grid2"><div class="field"><label>Naam</label><input id="f_name" value="${esc(l.name)}"></div><div class="field"><label>Type</label><select id="f_type">${Object.keys(EMOJI).map(t=>`<option ${l.type===t?'selected':''}>${t}</option>`).join('')}</select></div><div class="field"><label>Regio</label><input id="f_region" value="${esc(l.region||'')}"></div><div class="field"><label>Level</label><input id="f_lvl" type="number" value="${l.lvl||1}"></div><div class="field"><label>X %</label><input id="f_x" type="number" step="0.01" value="${l.x}"></div><div class="field"><label>Y %</label><input id="f_y" type="number" step="0.01" value="${l.y}"></div><div class="field"><label>Routevolgorde, 0 = geen route</label><input id="f_route" type="number" value="${l.route||0}"></div><div class="field"><label>Sterren 1-5</label><input id="f_stars" type="number" min="1" max="5" value="${l.stars||3}"></div></div><div class="field"><label>Tags komma-gescheiden</label><input id="f_tags" value="${esc((l.tags||[]).join(', '))}"></div><div class="field"><label>Beschrijving</label><textarea id="f_desc">${esc(l.desc||'')}</textarea></div><div class="field"><label>Wiki slug/zoekterm</label><input id="f_wiki" value="${esc(l.wiki||l.name)}"></div><div class="bar"><button onclick="saveMarker('${l.id}',${isNew})">Opslaan</button></div>`;el('modal').classList.add('show')}
function saveMarker(id,isNew){let l={id,name:el('f_name').value,type:el('f_type').value,region:el('f_region').value,x:+el('f_x').value,y:+el('f_y').value,lvl:+el('f_lvl').value,route:+el('f_route').value,stars:+el('f_stars').value,tags:el('f_tags').value.split(',').map(s=>s.trim()).filter(Boolean),desc:el('f_desc').value,wiki:el('f_wiki').value};if(isNew)locations.push(l);else locations=locations.map(a=>a.id===id?l:a);save();el('modal').classList.remove('show');render()}
function deleteMarker(id){if(confirm('Marker verwijderen?')){locations=locations.filter(l=>l.id!==id);delete done[id];save();el('modal').classList.remove('show');render()}}
function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function applyTransform(){inner.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`}
function resetView(){scale=1;tx=0;ty=0;applyTransform()}
shell.addEventListener('pointerdown',e=>{drag={x:e.clientX,y:e.clientY,tx,ty,moved:false};shell.setPointerCapture(e.pointerId)});
shell.addEventListener('pointermove',e=>{if(!drag)return;let dx=e.clientX-drag.x,dy=e.clientY-drag.y;if(Math.abs(dx)+Math.abs(dy)>3)drag.moved=true;tx=drag.tx+dx;ty=drag.ty+dy;applyTransform()});
shell.addEventListener('pointerup',e=>{if(drag&&!drag.moved&&admin){let r=img.getBoundingClientRect();let x=(e.clientX-r.left)/r.width*100,y=(e.clientY-r.top)/r.height*100;if(x>=0&&x<=100&&y>=0&&y<=100)markerForm({id:'m'+Date.now(),name:'Nieuwe marker',type:'quest',region:'',x,y,lvl:1,stars:3,tags:[],desc:'',route:0,wiki:''})}drag=null});
shell.addEventListener('wheel',e=>{e.preventDefault();let old=scale;scale=Math.min(4,Math.max(.65,scale*(e.deltaY<0?1.12:.88)));let rect=shell.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top;tx=mx-(mx-tx)*(scale/old);ty=my-(my-ty)*(scale/old);applyTransform()},{passive:false});
function exportData(){let blob=new Blob([JSON.stringify({locations,done},null,2)],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='dd2-companion-data.json';a.click()}
function importData(){let i=document.createElement('input');i.type='file';i.accept='.json';i.onchange=()=>{let f=i.files[0],r=new FileReader();r.onload=()=>{let d=JSON.parse(r.result);locations=d.locations||locations;done=d.done||done;save();render()};r.readAsText(f)};i.click()}
function resetData(){if(confirm('Lokale data terugzetten naar startset?')){locations=starter;done={};save();render()}}
el('tabRoute').onclick=()=>{tab='route';el('tabRoute').classList.add('active');el('tabAll').classList.remove('active');el('tabWiki').classList.remove('active');render()};el('tabAll').onclick=()=>{tab='all';el('tabAll').classList.add('active');el('tabRoute').classList.remove('active');el('tabWiki').classList.remove('active');render()};el('tabWiki').onclick=()=>{tab='wiki';el('tabWiki').classList.add('active');el('tabRoute').classList.remove('active');el('tabAll').classList.remove('active');render()};
el('resetView').onclick=resetView;el('adminBtn').onclick=()=>{admin=!admin;save();el('adminBtn').classList.toggle('active',admin);render()};el('closeModal').onclick=()=>el('modal').classList.remove('show');el('search').oninput=render;el('typeFilter').onchange=render;el('vocation').onchange=render;el('adminBtn').classList.toggle('active',admin);img.onload=()=>{svg.setAttribute('width',img.width);svg.setAttribute('height',img.height);render()};render();applyTransform();
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
</body>
</html>
