<!doctype html><html lang="nl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Dragon's Dogma II Companion</title><link rel="manifest" href="manifest.webmanifest"><link rel="stylesheet" href="style.css"><meta name="theme-color" content="#121621"><link rel="apple-touch-icon" href="icons/icon-192.png"></head><body>
<header><div><h1>Dragon's Dogma II Companion</h1><p>PS5 · spoiler aan · Teun Mode · Fighter start</p></div><button id="installBtn" hidden>Installeer</button></header>
<nav class="tabs"><button data-view="op" class="active">⭐ Map 1: OP-route</button><button data-view="complete">🗺️ Map 2: 100%</button><button data-view="database">🔍 Database</button><button data-view="admin">✍️ Marker-editor</button></nav>
<section class="controls"><label>Vocation<select id="vocation"></select></label><label>Zoeken<input id="search" placeholder="zoek wapens, quests, bazen, steden..."></label><label>Regio<select id="region"><option value="all">Alle regio's</option></select></label></section>
<section id="filters" class="filters"></section>
<main class="layout"><section class="mapCard"><div class="mapTop"><button id="zin">+</button><button id="zout">−</button><button id="resetView">Reset</button><span id="mapInfo"></span></div><div id="mapViewport"><div id="mapInner"><img src="assets/world-map.png" draggable="false"><svg id="route"></svg><div id="markers"></div></div></div></section><aside class="panel"><div id="stats"></div><h2 id="panelTitle"></h2><div id="list"></div></aside></main>
<section id="dbView" class="database hidden"><h2>Database</h2><p>Alles is doorzoekbaar. De app gebruikt offline opslag; jouw vinkjes blijven op je iPhone bewaard.</p><div id="dbList"></div></section>
<section id="adminView" class="database hidden"><h2>Marker-editor</h2><p>Klik in de kaart op een plek en vul daarna deze velden. Zo hoef jij geen coördinaten te kennen.</p><div class="editor"><label>Naam<input id="newName"></label><label>Type<select id="newType"></select></label><label>Regio<input id="newRegion" value="Vermund"></label><label>Level<input id="newLevel" type="number" value="1"></label><label>Loot/notes<input id="newLoot"></label><button id="saveMarker">Marker opslaan</button><button id="exportMarkers">Exporteer eigen markers</button></div><pre id="exportBox"></pre></section>
<dialog id="dlg"><button class="close" id="close">×</button><div id="detail"></div></dialog>
<script src="data/app-data.js"></script><script src="app.js"></script></body></html>
